version: "3.8"

services:
  db:
    image: postgres:15
    container_name: hifis-postgres
    restart: always
    environment:
      POSTGRES_USER: ${HIFIS_DB_USER}
      POSTGRES_PASSWORD: ${HIFIS_DB_PASSWORD}
      POSTGRES_DB: ${HIFIS_DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: