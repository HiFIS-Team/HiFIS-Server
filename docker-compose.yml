services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${HIFIS_DB_USER}
      POSTGRES_PASSWORD: ${HIFIS_DB_PASSWORD}
      POSTGRES_DB: ${HIFIS_DB_NAME}
      TZ: Asia/Seoul       # 컨테이너 OS 타임존
      PGTZ: Asia/Seoul     # Postgres 세션 타임존
    volumes:
      - pg_data:/var/lib/postgresql/data
    # 호스트 loopback(127.0.0.1)에만 바인딩 - 외부 IP로 Postgres 접근 차단 (보안).
    # 컨테이너끼리는 service name 'db'로 통신하므로 영향 없음.
    # 친구 서버에서 외부 psql 접근도 필요 없으면 이 ports 블록 자체 삭제 가능.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HIFIS_DB_USER} -d ${HIFIS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # 로그 무한 증가 방지 - 파일당 10MB, 최대 5개 회전
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy   # DB 준비 끝난 뒤 시작
    environment:
      # .env의 HIFIS_DB_HOST(=localhost)를 컨테이너 내부에서 서비스명 'db'로 덮어씀
      HIFIS_DB_HOST: db
    env_file:
      - .env                # 나머지 환경변수는 .env 그대로 사용
    # 전자서명 PNG 영속화 - 컨테이너 재기동에도 살아남음. 백업은 scripts/backup_db.sh에서 함께 처리.
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    # 마이그레이션 자동 실행 후 서버 시작
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    # 로그 무한 증가 방지 - 파일당 10MB, 최대 5개 회전
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pg_data:
